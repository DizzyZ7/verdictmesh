name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install "ruff>=0.9,<1"
      - name: Capture Ruff output
        run: ruff check . > ruff.log 2>&1 || touch ruff.failed
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ruff-output
          path: ruff.log
      - name: Enforce Ruff result
        run: test ! -f ruff.failed
      - run: pip install -e ".[dev]"
      - run: mypy src
      - run: pytest
      - run: DATABASE_URL=sqlite+pysqlite:///./migration-test.db alembic upgrade head
      - run: DATABASE_URL=sqlite+pysqlite:///./migration-test.db alembic downgrade base
